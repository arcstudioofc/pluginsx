# SpawnerX - Mensagens em Português (Brasil)

prefix: "&8[&f&lSpawner&c&lX&8]&r"

# Comandos
commands:
  reload:
    success: "{prefix} &aConfiguração recarregada com sucesso!"
    error: "{prefix} &cErro ao recarregar a configuração!"
  help:
    header: "&8&m          &r &eSpawnerX - Ajuda &8&m          "
    reload: "&e/spawnerx reload &7- Recarrega a configuração"
    license: "&e/spawnerx license key sua_key &7ou &e/spawnerx license status &7- Define a chave e consulta o status"
    admin: "&e/spawnerx admin &7- Abre menu admin de spawners"
    shop: "&e/spawnerx shop &7- Abre a loja de spawners"
    sell: "&e/spawnerx sell xp <valor> <quantidade> &7ou &e/spawnerx sell stats [player] &7- Vender e consultar status"
    trade: "&e/spawnerx trade <player|accept|deny> &7- Trocar spawners com outro jogador"
    help: "&e/spawnerx help &7- Mostra esta ajuda"
    footer: "&8&m                                    "
  no-permission: "{prefix} &cVocê não tem permissão para usar este comando!"

# Admin
admin:
  only-players: "{prefix} &cApenas jogadores podem usar /spawnerx admin."
  menu:
    give-success: "{prefix} &aVocê recebeu um spawner de &e{type} &ano nível &e{level}&a."
    mobs:
      title: "&8Admin Spawners &7(Mobs {page}/{pages})"
      header: "&6Selecionar tipo de spawner"
      item-name: "&e{type}"
      item-lore: "&7Escolha o tipo para abrir os níveis\\n&bClique para continuar"
      empty: "&cNenhum mob disponível para exibir"
    levels:
      title: "&8Níveis: &e{type} &7({page}/{pages})"
      header: "&6Níveis de &e{type}"
      item-name: "&6Nível {level}"
      item-lore: "&7Receba um spawner nesse nível\\n&bClique para coletar"
      empty: "&cNenhum nível disponível para este tipo"
    nav:
      prev: "&ePágina anterior"
      next: "&ePróxima página"
      back: "&eVoltar para mobs"
      page: "&7Página &e{page}&7/&e{pages}"

# Licença
license:
  locked: "{prefix} &cPlugin bloqueado: licença inválida ou não validada."
  allowed-commands: "{prefix} &7Comandos liberados: &e/spawnerx license key sua_key&7, &e/spawnerx license status &7e &e/spawnerx reload"
  usage: "/spawnerx license key sua_key | /spawnerx license status"
  saved: "{prefix} &aChave de licença salva com sucesso."
  reload-required: "{prefix} &eExecute &f/spawnerx reload &epara validar a licença."
  validating: "{prefix} &eValidando licença..."
  valid: "{prefix} &aLicença válida. Plugin liberado."
  invalid: "{prefix} &cLicença inválida. Plugin permanece bloqueado."
  error: "{prefix} &cFalha ao validar a licença. Plugin permanece bloqueado."
  admin-feedback: "{prefix} &aLicença validada com sucesso. Todas as funcionalidades estão ativas."
  status:
    valid: "{prefix} &aStatus da licença: &fVÁLIDA&a."
    invalid: "{prefix} &cStatus da licença: &fINVÁLIDA&c."
    validating: "{prefix} &eStatus da licença: &fVALIDANDO&e."

# Sistema de Quebra
break:
  wrong-tool: "{prefix} &cVocê não está usando uma ferramenta válida para quebrar spawners!"
  no-silk-touch: "{prefix} &cVocê precisa de &eToque Suave &cpara quebrar spawners!"
  no-permission: "{prefix} &cVocê não tem permissão para quebrar spawners!"
  success: "{prefix} &aVocê quebrou um spawner de &e{type}&a!"
  success-no-req: "{prefix} &eVocê quebrou o spawner de &6{type} &esem cumprir os requisitos!"
  fail-chance: "{prefix} &cO spawner de &e{type} &cquebrou em pedaços (falha na chance de drop)!"

# Sistema de Explosão
explosion:
  destroyed: "{prefix} &cUm spawner de &e{type} &cfoi destruído por uma explosão!"

# Sistema de Spawner
spawner:
  placed: "{prefix} &aVocê colocou um spawner de &e{type}&a!"
  stacked: "{prefix} &aVocê empilhou um spawner de &e{type}! Total: &e{amount}"
  lore:
    info: "&7Informações"
    type: "&7Tipo: &f{type}"
    rarity: "&7Raridade: {rarity_color}{rarity}"
    stack: "&7Stack: &e{amount}"
    level: "&7Nível: &e{level}"

upgrade:
  only-spawnerx: "{prefix} &cVocê só pode evoluir spawners gerenciados pelo SpawnerX!"
  stack-not-supported: "{prefix} &cVocê não pode evoluir spawners empilhados. Deixe o stack em 1."
  no-permission: "{prefix} &cVocê não tem permissão para evoluir spawners!"
  max-level: "{prefix} &eEste spawner já está no nível máximo (&f{level}&e)."
  invalid-path: "{prefix} &cConfiguração de cadeia inválida. Não foi possível encontrar o próximo nível."
  wrong-material: "{prefix} &cMaterial incorreto. Necessário: &e{required}&c. Em mãos: &e{provided}&c."
  not-enough-material: "{prefix} &cMateriais insuficientes: &e{current}/{required} {material}&c."
  success: "{prefix} &aSpawner de &e{type} &aevoluído para o nível &e{level}&a!"

# Geral
general:
  invalid-usage: "{prefix} &cUso incorreto! Use: &e{usage}"

# Trade
trade:
  usage: "/spawnerx trade <player|accept|deny>"
  only-players: "{prefix} &cApenas jogadores podem usar este comando."
  disabled: "{prefix} &cO sistema de trade esta desativado."
  self-target: "{prefix} &cVoce nao pode enviar trade para si mesmo."
