  too-far: "{prefix} &cOs jogadores devem estar a no maximo &e{distance} blocos &cde distancia."
  sender-busy: "{prefix} &cVoce ja esta em uma trade ativa ou com convite pendente."
  target-busy: "{prefix} &cO jogador &e{player} &cja esta em trade ou com convite pendente."
  countdown: "{prefix} &eTrade confirmada! Executando em &f{seconds}&es..."
  success: "{prefix} &aTrade concluida com sucesso com &e{player}&a."
  session:
    started: "{prefix} &aSessao de trade iniciada com &e{player}&a."
  invite:
    sent: "{prefix} &aConvite de trade enviado para &e{player}&a."
    received: "{prefix} &e{player} &7quer trocar spawners com voce."
    accept-button: "&a[ACEITAR]"
    deny-button: "&c[RECUSAR]"
    accept-hover: "&7Clique para aceitar a trade"
    deny-hover: "&7Clique para recusar a trade"
    none: "{prefix} &cVoce nao possui convite de trade pendente."
    sender-offline: "{prefix} &cO jogador que enviou o convite ficou offline."
    denied-target: "{prefix} &eVoce recusou o convite de &f{player}&e."
    denied-sender: "{prefix} &c{player} recusou seu convite de trade."
    expired-sender: "{prefix} &cSeu convite para &e{player} &cexpirou."
    expired-target: "{prefix} &cO convite de &e{player} &cexpirou."
  gui:
    title: "&8Trade: &e{player_a} &7x &e{player_b}"
    only-spawner: "{prefix} &cApenas spawners validos do SpawnerX podem ser trocados."
    header:
      left: "&bOferta de &f{player}"
      right: "&bOferta de &f{player}"
    emblem:
      name: "&3Nucleo de Trade Ciano"
    status:
      waiting: "&eAGUARDANDO"
      ready: "&aREADY"
    countdown:
      idle: "&7Aguardando dupla confirmacao"
      running: "&bExecutando em &f{seconds}s"
    distance:
      label: "&bDistancia: &f{distance}&7/&f{max} blocos"
      too-far: "&cMuito longe"
      ok: "&aDentro do alcance"
    confirm:
      red-name: "&cConfirmacao de {player}"
      red-lore: "&7Estado: &cNao confirmado\\n&7Clique para confirmar"
      green-name: "&aConfirmacao de {player}"
      green-lore: "&7Estado: &aConfirmado\\n&7Clique novamente para cancelar"
  cancel:
    closed: "{prefix} &cTrade cancelada: um jogador fechou o menu."
    player-left: "{prefix} &cTrade cancelada: um jogador saiu do servidor."
    unconfirmed: "{prefix} &cTrade cancelada: confirmacao foi desmarcada."
    items-changed: "{prefix} &cTrade cancelada: itens foram alterados apos confirmacao."
    too-far: "{prefix} &cTrade cancelada: os jogadores passaram de &e{distance} blocos &cde distancia."
    timeout: "{prefix} &cTrade cancelada por tempo esgotado."
    disabled: "{prefix} &cTrade cancelada: sistema desativado."
    shutdown: "{prefix} &cTrade cancelada: servidor/plugin desligando."

# Menu de Interação
menu:
  title: "&8Informações: &e{type}"
  info-item:
    name: "&eSpawner de {type}"
    environment: "&7Ambiente: {status}"
  status:
    valid: "&aVálido"
    invalid: "&cInválido"
  dynamic:
    title: "&eEstatísticas em Tempo Real"
    spawn-tick: "&7Tick de spawn: &e{delay} ticks"
    spawn-time: "&7Tempo entre spawns: &e{min}s - {max}s"
    status: "&7Status: {status}"
    status-active: "&aAtivo"
    status-inactive: "&cInativo (Sem players)"
    footer: "&8(Atualizando em tempo real)"
  stack-details:
    title: "&8Detalhes do Stack: &e{type} &7({page}/{pages})"
    item-name: "&eSpawner #{index} &7de &f{total}"
    item-lore: "&7Tipo: &f{type}\\n&7Nível: &e{level}\\n&7Unidade: {next_marker}&e{index}&7/&e{total}\\n&7Próximo índice: &e{next_index}\\n&7Modo de spawn: &e{chain_mode}\\n&7Ordem da cadeia: &e{chain_order}\\n&7Spawn por ciclo: &e{spawn_count}\\n&7Máx. entidades próximas: &e{max_nearby}\\n&7Delay atual: &e{delay} ticks\\n&7Intervalo: &e{min}s - {max}s\\n&7Status: {status}"
    empty: "&cNenhum spawner no stack para exibir"
    chain:
      mode:
        chained: "Cadeia"
        simultaneous: "Simultâneo"
      order:
        sequential: "Sequencial"
        random: "Aleatória"
        random-cycle: "Aleatória por ciclo"
      next-marker: "&a▶ "
      idle-marker: ""
    nav:
      prev: "&ePágina anterior"
      next: "&ePróxima página"
      back: "&eVoltar ao resumo"
      page: "&7Página &e{page}&7/&e{pages}"
  owner-item:
    name: "&f{player}"
    lore: "&7Este spawner foi colocado por."

