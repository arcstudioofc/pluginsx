name: SpawnerX
version: '2.0.0'
main: com.spawnerx.SpawnerX
api-version: '1.21'
author: Israel R. Jatobá
description: Plugin completo para gerenciamento de spawners

commands:
  spawnerx:
    description: Comando principal do SpawnerX
    aliases: [sx, spawner]
    usage: /<command> [reload | license key SUA_KEY | license status | admin | shop | sell xp <valor> <quantidade> | sell stats [player] | trade <player|accept|deny> | help]

permissions:
  spawnerx.admin:
    description: Permite uso de comandos administrativos
    default: op
  spawnerx.shop:
    description: Permite abrir o shop de spawners
    default: true
  spawnerx.sell:
    description: Permite anunciar spawners em vendas públicas
    default: true
  spawnerx.trade:
    description: Permite enviar e participar de trades de spawners
    default: true
  spawnerx.spawner.break:
    description: Permite quebrar spawners respeitando requisitos
    default: true
  spawnerx.spawner.break.explosion:
    description: Permite drop de spawner ao ser destruído por explosão
    default: true
  spawnerx.spawner.upgrade:
    description: Permite realizar upgrade de spawners
    default: true
